<h1>Device List</h1>

<ul>
    {% for d in devices %}
        <li>
            <strong>{{ d.name }}</strong> ({{ d.serial_number }})

            <ul>
                {% for nic in d.nics.all %}
                    <li>{{ nic.name }} - {{ nic.description }}</li>
                {% empty %}
                    <li>No NICs</li>
                {% endfor %}
            </ul>

            <a href="{% url 'device_delete' d.pk %}">Delete</a>
        </li>
    {% endfor %}
</ul>
