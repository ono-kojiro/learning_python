name: IPv4
meta:
  verbose_name: IPv4
  verbose_name_plural: IPv4
fields:
  ipv4_id:
    type: CharField
    max_length: 100
    unique: true
  method:
    type: CharField
    max_length: 16
    default: manual
  addresses:
    type: JSONField
    help_text: CIDR Format (ex. [ 192.168.1.72/24 ])
  gateway:
    type: CharField
    max_length: 64
  dns:
    type: JSONField
    help_text: list of DNS servers
  netif:
    type: ForeignKey
    to: NetIF
    on_delete: SET_NULL
    'null': true
    blank: true
