---
Manager:
  meta:
    verbose_name: "Manager"
    verbose_name_plural: "Managers"

  fields:
    manager_id:
      type: String
      unique: true
      max_length: 100

    name:
      type: String
      max_length: 100

    email:
      type: String
      max_length: 255

    devices:
      type: ManyToMany
      to: Device

